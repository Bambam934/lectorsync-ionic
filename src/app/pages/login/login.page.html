<ion-content class="ion-padding" [fullscreen]="true">
  <div class="login-container">
    <div class="logo-section">
      <ion-icon name="book-outline" class="logo-icon"></ion-icon>
      <h1>LectorSync</h1>
      <p>Lectura sincronizada con audio</p>
    </div>

    <ion-card>
      <ion-card-header>
        <ion-card-title>
          {{ isRegister ? 'Crear cuenta' : 'Iniciar sesión' }}
        </ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <ion-item *ngIf="isRegister">
          <ion-label position="floating">Nombre</ion-label>
          <ion-input
            type="text"
            [(ngModel)]="name"
            autocapitalize="words"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Correo electrónico</ion-label>
          <ion-input
            type="email"
            [(ngModel)]="email"
            autocomplete="email"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Contraseña</ion-label>
          <ion-input
            type="password"
            [(ngModel)]="password"
            (keyup.enter)="submit()"
          ></ion-input>
        </ion-item>

        <ion-button expand="block" (click)="submit()" class="ion-margin-top">
          {{ isRegister ? 'Registrarse' : 'Ingresar' }}
        </ion-button>

        <ion-button
          expand="block"
          fill="clear"
          (click)="toggleMode()"
          class="ion-margin-top"
        >
          {{
            isRegister
              ? '¿Ya tienes cuenta? Inicia sesión'
              : '¿No tienes cuenta? Regístrate'
          }}
        </ion-button>
      </ion-card-content>
    </ion-card>

    <p class="team-label">EquipoEPMB02 - 4</p>
  </div>
</ion-content>
